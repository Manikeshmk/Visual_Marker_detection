name: Build APK Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-levels: 35
          build-tools: 35.0.0
          ndk-version: 27.1.12297006

      - name: Install dependencies
        run: npm install

      - name: Check Nitro modules
        run: |
          if [ -d "node_modules/react-native-nitro-modules" ]; then
            echo "✓ Nitro modules found"
          else
            echo "⚠ Nitro modules not found - installing full dependencies"
            npm ci
          fi

      - name: Create Android keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkey -v -keystore $HOME/.android/debug.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias androiddebugkey -keypass android -storepass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x lint -Porg.gradle.jvmargs=-Xmx4096m

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: marker-detector-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
